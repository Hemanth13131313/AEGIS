apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: aegis-verify-image-signatures
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces: [aegis]
      verifyImages:
      - imageReferences:
        - "ghcr.io/aegis-security/aegis-*"
        attestors:
        - count: 1
          entries:
          - keyless:
              subject: "https://github.com/aegis-security/aegis/.github/workflows/supply-chain.yml@refs/heads/main"
              issuer: "https://token.actions.githubusercontent.com"
              rekor:
                url: https://rekor.sigstore.dev
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: aegis-require-sbom-attestation
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-cyclonedx-sbom
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces: [aegis]
      verifyImages:
      - imageReferences:
        - "ghcr.io/aegis-security/aegis-*"
        attestations:
        - predicateType: https://cyclonedx.org/bom
          attestors:
          - entries:
            - keyless:
                subject: "https://github.com/aegis-security/aegis/.github/workflows/supply-chain.yml@refs/heads/main"
                issuer: "https://token.actions.githubusercontent.com"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: aegis-disallow-privileged
spec:
  validationFailureAction: Enforce
  rules:
    - name: disallow-privileged-containers
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces: [aegis]
      validate:
        message: "Privileged containers are not allowed in the aegis namespace"
        pattern:
          spec:
            containers:
            - =(securityContext):
                =(privileged): false
