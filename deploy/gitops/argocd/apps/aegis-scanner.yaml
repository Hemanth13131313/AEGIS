apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-scanner
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: aegis
  source:
    repoURL: https://github.com/aegis-security/aegis
    targetRevision: HEAD
    path: deploy/helm/aegis-scanner
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
