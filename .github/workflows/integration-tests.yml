name: Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - 'apps/gateway/**'
      - 'tests/integration/**'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Run Integration Tests
      run: go test -v -tags=integration ./tests/integration/...
