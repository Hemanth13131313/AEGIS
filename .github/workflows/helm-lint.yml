name: Helm Lint

on:
  push:
    paths:
      - 'deploy/helm/**'
  pull_request:
    paths:
      - 'deploy/helm/**'

jobs:
  lint-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Gateway Chart
        run: helm lint deploy/helm/aegis-gateway

      - name: Lint Scanner Chart
        run: helm lint deploy/helm/aegis-scanner

      - name: Lint Control Plane Chart
        run: helm lint deploy/helm/aegis-control-plane
